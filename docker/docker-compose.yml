version: "3.9"

services:
  db:
    image: mariadb:11.4
    container_name: portal-honorio-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: portal_honorio_bicalho
      MARIADB_USER: portal
      MARIADB_PASSWORD: portal
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - portal_honorio_db:/var/lib/mysql

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 4000
      DATABASE_URL: mysql://portal:portal@db:3306/portal_honorio_bicalho
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - db
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql://portal:portal@db:3306/portal_honorio_bicalho
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  portal_honorio_db:
