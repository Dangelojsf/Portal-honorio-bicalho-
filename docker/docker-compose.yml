version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: portal-honorio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_honorio_bicalho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - portal_honorio_db:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/portal_honorio_bicalho?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - db
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/portal_honorio_bicalho?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  portal_honorio_db:
